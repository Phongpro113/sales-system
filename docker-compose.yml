services:
  postgres:
    image: postgres:15-alpine
    pull_policy: if_not_present
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - sales-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=auth_db port=5432 sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-your-secret-key-change-this-in-production}"
      PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sales-network
    restart: unless-stopped

  product-service:
    build: ./services/product-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=product_db port=5432 sslmode=disable"
      PORT: "8002"
      BASE_URL: "${BASE_URL:-http://localhost:8081}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sales-network
    restart: unless-stopped

  order-service:
    build: ./services/order-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=order_db port=5432 sslmode=disable"
      PRODUCT_SERVICE_URL: "http://product-service:8002"
      JWT_SECRET: "${JWT_SECRET:-your-secret-key-change-this-in-production}"
      PORT: "8003"
    depends_on:
      - postgres
      - product-service
    networks:
      - sales-network
    restart: unless-stopped

  admin-service:
    build: ./services/admin-service
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=product_db port=5432 sslmode=disable"
      PORT: "8005"
      BASE_URL: "${BASE_URL:-http://localhost:8081}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sales-network
    volumes:
      - ./uploads:/root/uploads
    restart: unless-stopped

  file-service:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads
    command: /bin/sh -c "echo 'server { listen 80; location /uploads { root /usr/share/nginx/html; autoindex on; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - sales-network
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: "jdbc:postgresql://postgres:5432/payment_db"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      PORT: "8004"
      ORDER_SERVICE_URL: "http://order-service:8003"
      MOMO_PARTNER_CODE: "${MOMO_PARTNER_CODE:-MOMO_PARTNER_CODE}"
      MOMO_ACCESS_KEY: "${MOMO_ACCESS_KEY:-MOMO_ACCESS_KEY}"
      MOMO_SECRET_KEY: "${MOMO_SECRET_KEY:-MOMO_SECRET_KEY}"
      MOMO_ENDPOINT: "${MOMO_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}"
      MOMO_REDIRECT_URL: "${MOMO_REDIRECT_URL:-http://localhost:3000/orders}"
      MOMO_IPN_URL: "${MOMO_IPN_URL:-http://payment-service:8004/api/payments/momo/ipn}"
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
    networks:
      - sales-network
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: "http://auth-service:8001"
      PRODUCT_SERVICE_URL: "http://product-service:8002"
      ORDER_SERVICE_URL: "http://order-service:8003"
      PAYMENT_SERVICE_URL: "http://payment-service:8004"
      ADMIN_SERVICE_URL: "http://admin-service:8005"
      FILE_SERVICE_URL: "http://file-service:80"
      JWT_SECRET: "${JWT_SECRET:-your-secret-key-change-this-in-production}"
      PORT: "8080"
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
      - admin-service
      - file-service
    networks:
      - sales-network
    restart: unless-stopped

networks:
  sales-network:
    driver: bridge

volumes:
  postgres_data: